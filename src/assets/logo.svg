  <!-- legs -->
  <ellipse cx="330" cy="560" rx="70" ry="35" fill="#4564d3"/>
  <ellipse cx="470" cy="560" rx="70" ry="35" fill="#4564d3"/>

  <!-- petals -->
  <ellipse cx="400" cy="220" rx="40" ry="75" fill="#7fd38d"/>
  <ellipse cx="320" cy="270" rx="35" ry="65" transform="rotate(-35 320 270)" fill="#57c8ba"/>
  <ellipse cx="480" cy="270" rx="35" ry="65" transform="rotate(35 480 270)" fill="#57b4d8"/>
  <ellipse cx="290" cy="340" rx="30" ry="60" transform="rotate(-70 290 340)" fill="#b39be4"/>
  <ellipse cx="510" cy="340" rx="30" ry="60" transform="rotate(70 510 340)" fill="#b39be4"/>
