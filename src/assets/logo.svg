      <stop offset="0%" stop-color="#66d1b2"/>
      <stop offset="100%" stop-color="#3f63d3"/>
    </linearGradient>
  </defs>

  <!-- outer arc -->
  <path d="M220 280
           C120 380,120 560,300 640
           L500 640
